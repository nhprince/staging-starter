# Saturday Framework — Local Development Environment
# Usage: docker-compose up
# 
# This provides a complete local development environment
# that mirrors production Cloudflare infrastructure.

version: "3.9"

services:
  # Frontend development server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

  # Backend Worker (local simulation)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8787:8787"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - d1-data:/app/.wrangler/state
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  # Local D1 database (SQLite via wrangler)
  # Wrangler dev mode handles this automatically
  # This service is for reference/documentation

volumes:
  d1-data:
    driver: local
