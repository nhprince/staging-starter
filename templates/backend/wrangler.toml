# Backend template for new projects
# Copy this directory and update the values below
name = "{{PROJECT_NAME}}"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "{{KV_NAMESPACE_ID}}"

[[d1_databases]]
binding = "DB"
database_name = "{{PROJECT_NAME}}-db"
database_id = "{{D1_DATABASE_ID}}"
