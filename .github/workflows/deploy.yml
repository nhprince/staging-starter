name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: "cloudflare"
        type: choice
        options:
          - cloudflare
          - server

jobs:
  deploy-cloudflare:
    if: github.event.inputs.deploy_target == 'cloudflare' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: frontend
          command: pages deploy out --project-name=staging-starter

      - name: Install backend dependencies
        run: cd backend && pnpm install --no-frozen-lockfile

      - name: Deploy Backend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: backend
          command: deploy

  deploy-server:
    if: github.event.inputs.deploy_target == 'server'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/staging-starter
            git pull origin main
            pnpm install
            cd frontend && pnpm build && cd ..
            cd backend && pnpm install && cd ..
            pm2 restart staging-starter 2>/dev/null || echo "No PM2 process to restart"
            echo "✅ Deployed to server"
